<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- PHASE-2 popup (Module 3): same read-only HUD + the placement scripts.
         Used only by manifest.module3.json. The launch popup.html omits the
         exchange scripts for a minimal store-review footprint. -->
    <link rel="stylesheet" href="content.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <span class="brand"><span class="dot"></span>HypeLens</span>
      <select id="coinSel" title="Coin"></select>
      <button id="refresh" class="pop-refresh" title="Refresh">↻</button>
    </header>
    <div id="hud"></div>
    <div id="placeMount"></div>
    <div class="pop-note" id="popNote"></div>

    <script src="viewmodel.js"></script>
    <script src="vendor/lightweight-charts.standalone.production.js"></script>
    <script src="hud.js"></script>
    <script src="vendor/hl-sdk.js"></script>
    <script src="exchange/hl-actions.js"></script>
    <script src="exchange/hl-vault.js"></script>
    <script src="exchange/hl-signer.js"></script>
    <script src="exchange/hl-eth-bridge.js"></script>
    <script src="exchange/hl-place.js"></script>
    <script src="exchange/place-ui.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
