<!doctype html>
<!-- CWS Small promo tile — 440×280 — JPEG/PNG no alpha required by CWS. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>PolyParlay — Small promo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="_styles.css" />
  <style>
    body { width: 440px; height: 280px; }
    .frame { width: 440px; height: 280px; padding: 26px 28px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-mark { width: 36px; height: 36px; background: var(--ink); border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 0 4px; font-weight: 900; font-size: 20px; line-height: 1; letter-spacing: -2px; box-shadow: 3px 3px 0 var(--ink); }
    .brand-mark .p1 { color: var(--accent); }
    .brand-mark .p2 { color: var(--amber); }
    .brand-name { font-weight: 900; font-size: 17px; letter-spacing: -0.01em; }
    .badge { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 800; letter-spacing: 1.4px; background: var(--amber); color: var(--ink); padding: 4px 8px; border-radius: 5px; border: 1.5px solid var(--ink); box-shadow: 2px 2px 0 var(--ink); margin-left: auto; }
    h1 { font-size: 28px; line-height: 1.05; font-weight: 900; letter-spacing: -0.03em; margin: 12px 0 8px; }
    h1 .amber { color: var(--amber-dk); }
    .sub { font-size: 12.5px; color: var(--ink-2); line-height: 1.45; margin: 0; }
    .sub strong { color: var(--ink); font-weight: 800; }
    .pills { display: flex; gap: 6px; }
    .pill { background: var(--ink); color: var(--bg); font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; padding: 5px 9px; border-radius: 5px; }
    .pill.amber { background: var(--amber); color: var(--ink); }
    .domain { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 800; color: var(--ink); letter-spacing: 0.8px; }
    .domain::before { content: '↗ '; color: var(--amber-dk); }
  </style>
</head>
<body>
  <div class="frame">
    <div class="brand">
      <span class="brand-mark"><span class="p1">P</span><span class="p2">P</span></span>
      <span class="brand-name">PolyParlay</span>
      <span class="badge">CHROME</span>
    </div>
    <div>
      <h1>10K Monte Carlo +<br/><span class="amber">Improve Odds</span> for Polymarket.</h1>
      <p class="sub">Stack multi-leg PM parlays. See your <strong>real win rate</strong>, not just the multiplier. Free up to 3 legs.</p>
    </div>
    <div class="pills" style="justify-content: space-between; align-items: center;">
      <div style="display:flex; gap:6px;">
        <span class="pill amber">FREE TIER</span>
        <span class="pill">10K SIMS</span>
        <span class="pill">KELLY SIZING</span>
      </div>
      <span class="domain">polyparlay.app</span>
    </div>
  </div>
</body>
</html>
