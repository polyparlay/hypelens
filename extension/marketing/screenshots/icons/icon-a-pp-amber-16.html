<!doctype html>
<!-- 16×16 toolbar icon — native render. Border + letter sizing tuned for
     pixel-grid legibility at this size. No web fonts (would shift glyphs). -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 16px; height: 16px; background: transparent; }
    .tile {
      width: 16px; height: 16px;
      background: #fbbf24;
      border: 1px solid #0a0c14;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-weight: 900;
      font-size: 12px;
      letter-spacing: -1.5px;
      line-height: 1;
    }
    .tile .p1 { color: #4f46e5; }
    .tile .p2 { color: #0a0c14; }
  </style>
</head>
<body>
  <div class="tile"><span class="p1">P</span><span class="p2">P</span></div>
</body>
</html>
