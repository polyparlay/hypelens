<!doctype html>
<!-- Icon B: PP on dark ink tile. Indigo + amber letters on near-black. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 128px; height: 128px; }
    .tile {
      width: 128px; height: 128px;
      background: #0a0c14;
      border: 4px solid #0a0c14;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', -apple-system, sans-serif;
      font-weight: 900;
      font-size: 78px;
      letter-spacing: -8px;
      line-height: 1;
    }
    .tile .p1 { color: #6366f1; }
    .tile .p2 { color: #fbbf24; }
  </style>
</head>
<body>
  <div class="tile">
    <span class="p1">P</span><span class="p2">P</span>
  </div>
</body>
</html>
