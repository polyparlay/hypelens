<!doctype html>
<!-- Icon A: PP wordmark on amber tile. The brand mark, max-contrast. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 128px; height: 128px; background: #f5f1e8; }
    .tile {
      width: 128px; height: 128px;
      background: #fbbf24;
      border: 4px solid #0a0c14;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', -apple-system, sans-serif;
      font-weight: 900;
      font-size: 78px;
      letter-spacing: -8px;
      line-height: 1;
    }
    .tile .p1 { color: #4f46e5; }
    .tile .p2 { color: #0a0c14; }
  </style>
</head>
<body>
  <div class="tile">
    <span class="p1">P</span><span class="p2">P</span>
  </div>
</body>
</html>
