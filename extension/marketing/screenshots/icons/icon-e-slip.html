<!doctype html>
<!-- Icon E: Stacked parlay slip — abstract three-leg ticket. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 128px; height: 128px; background: #f5f1e8; }
    .tile {
      width: 128px; height: 128px;
      background: #fdfcf7;
      border: 4px solid #0a0c14;
      padding: 18px 14px;
      display: flex; flex-direction: column; gap: 8px;
      justify-content: center;
    }
    .leg {
      height: 18px;
      background: #ffffff;
      border: 3px solid #0a0c14;
      border-radius: 4px;
      display: flex; align-items: center;
      padding: 0 6px;
      box-shadow: 2px 2px 0 #0a0c14;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; }
    .bar { flex: 1; height: 4px; background: #d1d5db; border-radius: 1px; }
    .leg.yes .dot { background: #16a34a; }
    .leg.yes .bar { background: #16a34a; }
    .leg.flip .dot { background: #fbbf24; }
    .leg.flip .bar { background: #fbbf24; }
    .leg.fed .dot { background: #4f46e5; }
    .leg.fed .bar { background: #4f46e5; }
  </style>
</head>
<body>
  <div class="tile">
    <div class="leg yes"><div class="dot"></div><div class="bar"></div></div>
    <div class="leg flip"><div class="dot"></div><div class="bar"></div></div>
    <div class="leg fed"><div class="dot"></div><div class="bar"></div></div>
  </div>
</body>
</html>
